      priority: "high"
    - task: "GET /students/ endpoint with RBAC"
      priority: "high"
    - task: "POST /students/import with openpyxl + row-level error log"
      priority: "high"
    - task: "Redis client setup and ConsensusEngine class"
      priority: "high"
    - task: "WebSocket /ws/match/{match_id} with ConnectionManager"
      priority: "high"
    - task: "pytest unit tests for ConsensusEngine (threshold, TTL, double-confirm)"
      priority: "medium"
    - task: "pytest integration tests for API endpoints"
      priority: "medium"
  frontend:
    - task: "React + Vite + TanStack Query + Tailwind setup"
      priority: "high"
    - task: "useStudents hook with debounce and URL param sync"
      priority: "high"
    - task: "StudentCard component (mobile)"
      priority: "high"
    - task: "StudentTable component (desktop)"
      priority: "high"
    - task: "FilterDrawer (mobile bottom sheet)"
      priority: "high"
    - task: "ImportModal with step-by-step flow and error highlight"
      priority: "high"
    - task: "useMatchScoring WebSocket hook"
      priority: "high"
    - task: "RefereeConsole responsive layout"
      priority: "high"
